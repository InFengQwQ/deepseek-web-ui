<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>DeepSeek</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/chat.css">
  <!--
    NOTE: This project uses classic <script> tags with IIFE + window.* globals
    instead of ES modules (import/export). Reason: the app is opened via the
    file:// protocol in a local browser, which blocks ES module requests due
    to strict CORS / opaque-origin policies.

    SCRIPT LOAD ORDER (defer preserves order; each file depends on all above):
      ┌─ base/ (infrastructure, no mutual deps internally)
      │  dom.js          → App.DomRefs, App.initDomRefs, App.getMessageElement
      │  markdown.js     → App.renderMarkdownToHTML
      │  constants.js    → App.STORAGE_KEYS, App.STATUS, App.UI, App.CFG, App.CONFIG_SCHEMA
      │  icons.js        → App.ICONS (SVG strings)
      │  utils.js        → App.setHidden, setStatus, errorStatus, formatMessageTime, autoResizeTextarea, etc.
      │  state.js        → App.state (messages, config, generation flags) + mutation API
      │  versions.js     → App.getVersionInfo, cloneVersionEntry, applyCurrentVersion, etc.
      │  messages.js     → App.createMessage, findMessageById, persistMessages, normalizeMessageRecord, etc.
      ├─ chat/ (feature layer)
      │  actionbar.js    → App.createActionIconBtn, App.syncGenButtonStates
      │  reasoning.js    → App.createReasoningBlockDOM, App.upsertReasoningBlock
      │  editor.js       → App.createEditModeUI, App.createEmptyStateInputRow
      │  msgcard.js      → App.renderMessageItem, App.getMessageContentHTML
      │  layout.js       → App.renderMessages, renderEmptyState, updateSingleMessageDOM, refreshMessageDOM
      │  api.js          → App.buildRequestBody, App.streamWithAbort
      │  config.js       → App.syncConfigToUI, App.saveConfiguration
      │  generation.js   → App.generateNewResponse, prefixCompletion, regenerateAssistant, stopGeneration
      │  actions.js      → App.clearAllMessages, export/import, insertUserMessageAfter, editMessage, deleteMessage
      ├─ base/events.js  → App.bindAllEvents (last: needs all handlers registered)
      └─ app.js          → bootstrapApp (final entry point)
  -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>
<body>
  <div class="top-bar">
    <div class="top-group">
      <div class="field min-width-200">
        <label>API KEY</label>
        <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
      </div>
      <div class="field">
        <label>模型</label>
        <select id="modelSelect">
          <option value="deepseek-v4-flash">deepseek-v4-flash</option>
          <option value="deepseek-v4-pro">deepseek-v4-pro</option>
        </select>
      </div>
      <div class="field">
        <label class="switch-label">
          <input type="checkbox" id="thinkingToggle">
          <span>深度思考</span>
        </label>
      </div>
      <div class="field" id="effortField">
        <label>思考强度</label>
        <select id="effortSelect">
          <option value="high">high</option>
          <option value="max" selected>max</option>
        </select>
      </div>
      <div class="field u-none" id="tempField">
        <label>温度</label>
        <input type="number" id="tempInput" class="narrow-number" value="0.7" step="0.1" min="0" max="2">
      </div>
      <button id="systemPromptBtn" class="small">系统提示词</button>
      <button id="saveConfigBtn" class="primary small">保存配置</button>
      <div class="top-actions-row">
        <button id="exportBtn" class="small">导出</button>
        <button id="importBtn" class="small">导入</button>
        <button id="clearHistoryBtn" class="small danger-btn">清空对话</button>
      </div>
    </div>
  </div>

  <div class="chat-pane" id="chatContainer"></div>

  <div class="modal-overlay u-none" id="systemPromptModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="systemPromptTitle">
      <div class="modal-header">
        <div>
          <h2 id="systemPromptTitle">系统提示词</h2>
        </div>
        <button type="button" class="icon-btn modal-close-btn" id="systemPromptCloseBtn" aria-label="关闭">×</button>
      </div>
      <label class="modal-field">
        <span>内容</span>
        <textarea id="systemPromptInput" class="compact-textarea system-prompt-textarea" rows="10"></textarea>
      </label>
    </div>
  </div>

  <button class="scroll-to-bottom-btn is-invisible" id="scrollToBottomBtn" title="回到最底部">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
  </button>

  <div class="status-bar" id="statusMsg">就绪</div>

  <button class="stop-generation-btn u-none" id="stopGenBtn" title="停止生成">
    <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" /></svg>
  </button>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
          integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"
          integrity="sha384-AX0sZ/phUL4R6LAFP+mob0mJIWg2c3PX8wPn48ctytOl7XKfRQHbakBt5/QID7uh"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
          integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8"
          crossorigin="anonymous"></script>
  <script src="script/base/dom.js" defer></script>
  <script src="script/base/markdown.js" defer></script>
  <script src="script/base/constants.js" defer></script>
  <script src="script/base/icons.js" defer></script>
  <script src="script/base/utils.js" defer></script>
  <script src="script/base/state.js" defer></script>
  <script src="script/base/versions.js" defer></script>
  <script src="script/base/messages.js" defer></script>
  <script src="script/chat/actionbar.js" defer></script>
  <script src="script/chat/reasoning.js" defer></script>
  <script src="script/chat/editor.js" defer></script>
  <script src="script/chat/msgcard.js" defer></script>
  <script src="script/chat/layout.js" defer></script>
  <script src="script/chat/api.js" defer></script>
  <script src="script/base/config.js" defer></script>
  <script src="script/chat/generation.js" defer></script>
  <script src="script/chat/actions.js" defer></script>
  <script src="script/base/events.js" defer></script>
  <script src="script/app.js" defer></script>
</body>
</html>
